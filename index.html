<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snail Race Chore Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <style>
        :root {
            /* Very soft, airy pastel blue-purple (lavender-tinged periwinkle ice) */
            --bg-color: #dbe2ef; 
            /* A tiny step deeper for an ultra-subtle, clean track definition */
            --stadium-bg: #cbd3e3; 
            --text-main: #2b3240;
            --text-muted: #5c6475;
            --border-pixel: 4px solid #6d7587;
            --font-pixel: 'VT323', monospace;
            
            /* UI Containers */
            --ui-card-bg: #edf2fa; /* Lightest pastel background for the main container */
            --ui-shadow: 0 8px 0px #b8c1d4;
            --track-shadow: 0 4px 0px #b2b9cb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-pixel);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            position: relative;
            background: var(--ui-card-bg);
            border: var(--border-pixel);
            border-radius: 16px;
            padding: 40px 24px 24px 24px;
            box-shadow: var(--ui-shadow);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            position: relative;
        }

        h1 {
            font-size: 38px;
            color: var(--text-main);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-shadow: 2px 2px 0px #cbd6e2;
        }

        .subtitle {
            font-size: 20px;
            color: var(--text-muted);
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0 10px;
        }

        /* Floating Corner Add Button */
        .fab-btn {
            position: absolute;
            top: -20px;
            right: 20px;
            background: #e3a034; 
            color: #ffffff;
            border: var(--border-pixel);
            border-radius: 8px;
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 0px #ad751f;
            z-index: 10;
        }
        .fab-btn:hover {
            background: #d4932c;
            transform: translateY(2px);
            box-shadow: 0 2px 0px #ad751f;
        }

        /* Modal / Form Pop-up */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--ui-card-bg);
            border: var(--border-pixel);
            border-radius: 12px;
            padding: 30px;
            z-index: 100;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 12px 0px rgba(0,0,0,0.1), 0 0 0 9999px rgba(109, 117, 135, 0.4);
        }

        .modal h2 {
            font-size: 30px;
            margin-bottom: 24px;
            color: var(--text-main);
            text-align: center;
        }

        .form-row {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-row label {
            font-size: 20px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        input, select {
            background: #ffffff;
            color: var(--text-main);
            border: var(--border-pixel);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 22px;
            font-family: var(--font-pixel);
            outline: none;
        }

        input:focus, select:focus {
            border-color: #e3a034;
        }

        .modal-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 16px;
        }

        .btn {
            padding: 8px 16px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            background: #ffffff;
            color: var(--text-main);
            border: var(--border-pixel);
            border-radius: 6px;
        }
        .btn-success { background: #8bcfae; box-shadow: 0 4px 0 #5f9e82; color: white; }
        .btn-success:hover { background: #7bbe9e; }
        .btn-danger { background: #e09292; box-shadow: 0 4px 0 #ab6565; color: white; }
        .btn-danger:hover { background: #cf8383; }

        /* Categorized Stadium Tracks Container */
        .stadium-wrapper {
            margin-bottom: 40px;
        }

        /* Category Titles */
        .group-title {
            font-size: 26px;
            text-transform: uppercase;
            margin-bottom: 10px;
            padding-left: 8px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .house-title { color: #b07e0e; }
        .beauty-title { color: #9c4776; }
        .health-title { color: #2c7d48; }
        .work-title { color: #23678c; }

        .group-stadium {
            border: var(--border-pixel);
            border-radius: 12px;
            background: var(--stadium-bg);
            padding: 16px 20px;
            position: relative;
            box-shadow: var(--track-shadow);
        }

        /* Multi-Lane Layout */
        .stadium-lane {
            position: relative;
            border-bottom: 4px dashed #abb2c4;
            padding: 16px 0;
            display: flex;
            align-items: center;
            min-height: 90px;
        }
        .stadium-lane:last-child {
            border-bottom: none;
        }

        /* Sidebar Info Board */
        .snail-label-zone {
            width: 210px;
            font-size: 24px;
            line-height: 1.2;
            padding-right: 14px;
            border-right: 4px solid #abb2c4;
            word-break: break-word;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .snail-meta {
            font-size: 18px;
            color: #4b5263;
        }

        /* Track Running Lane (Stripes strictly secured here) */
        .race-field {
            flex: 1;
            position: relative;
            height: 52px;
            margin-left: 14px;
            background: repeating-linear-gradient(
                90deg,
                rgba(255, 255, 255, 0.15),
                rgba(255, 255, 255, 0.15) 20px,
                rgba(255, 255, 255, 0.3) 20px,
                rgba(255, 255, 255, 0.3) 40px
            );
            border-radius: 4px;
            padding-right: 60px;
        }

        /* Checkerboard Finish Flag Gate */
        .finish-line-stripe {
            position: absolute;
            right: 15px;
            top: 0;
            bottom: 0;
            width: 16px;
            background-color: #ffffff;
            background-image: 
                linear-gradient(45deg, #6d7587 25%, transparent 25%, transparent 75%, #6d7587 75%),
                linear-gradient(45deg, #6d7587 25%, #ffffff 25%, #ffffff 75%, #6d7587 75%);
            background-size: 8px 8px;
            background-position: 0 0, 4px 4px;
            border-left: 2px solid #6d7587;
            border-right: 2px solid #6d7587;
            z-index: 2;
        }

        /* Decorative Track Props */
        .track-prop {
            position: absolute;
            font-size: 14px;
            opacity: 0.35;
            user-select: none;
            pointer-events: none;
            z-index: 1;
        }
        .prop-flower { bottom: 2px; right: 80px; }
        .prop-grass { top: 2px; left: 40px; }
        .prop-pebble { bottom: 4px; left: 140px; }

        /* Snail Container Asset Wrapper */
        .pixel-snail-container {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            user-select: none;
            transition: left 0.5s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        /* Custom Pixel Snail SVG */
        .snail-svg {
            width: 52px;
            height: 38px;
            image-rendering: pixelated;
        }

        /* Ready Flag Animation */
        .pixel-snail-container.waiting {
            animation: pixelBounce 0.5s steps(2) infinite alternate;
        }

        @keyframes pixelBounce {
            from { transform: translateY(-50%); }
            to { transform: translateY(-65%); }
        }

        /* Dynamic Status Badges */
        .status-badge {
            font-size: 16px;
            padding: 2px 8px;
            display: inline-block;
            border-radius: 4px;
            width: fit-content;
        }
        .status-overdue { 
            background: #f2c9c9;
            color: #8c3232; 
            font-weight: bold; 
            animation: blink 1.2s steps(2) infinite;
        }
        .status-running { 
            background: #c9e6d0;
            color: #1e522f; 
        }

        @keyframes blink { to { opacity: 0.7; } }

        /* Native App Controls */
        .action-icon {
            background: transparent;
            border: none;
            color: #838b9c;
            cursor: pointer;
            margin-left: 12px;
            padding: 6px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .action-icon:hover { 
            color: #bf5a5a; 
            background: rgba(255, 255, 255, 0.4);
        }

        .empty-track-msg {
            font-size: 20px;
            color: var(--text-muted);
            text-align: center;
            padding: 24px 0;
            border: 4px dashed #b8c1d4;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.4);
        }

        /* ==========================================================================
           📱 SMARTPHONE PROPORTIONS FIX 
           ========================================================================== */
        @media (max-width: 650px) {
            body {
                padding: 12px 6px;
            }
            .container {
                padding: 24px 10px 16px 10px;
            }
            h1 {
                font-size: 26px;
                flex-wrap: wrap;
                line-height: 1.2;
            }
            .subtitle {
                font-size: 17px;
            }
            .group-stadium {
                padding: 12px 10px;
            }
            .stadium-lane {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
                padding: 16px 0 20px 0;
            }
            .snail-label-zone {
                width: 100%;
                border-right: none;
                padding-right: 32px; 
                padding-bottom: 0;
                display: block;
            }
            .snail-label-zone strong {
                display: block;
                font-size: 22px;
                margin-bottom: 2px;
            }
            .snail-meta {
                display: inline-block;
                font-size: 16px;
                margin-right: 10px;
            }
            .status-badge {
                display: inline-block;
                font-size: 14px;
                vertical-align: middle;
            }
            .race-field {
                margin-left: 0;
                width: 100%;
                height: 56px;
                /* Re-enforce stripes explicitly inside mobile view state */
                background: repeating-linear-gradient(
                    90deg,
                    rgba(255, 255, 255, 0.15),
                    rgba(255, 255, 255, 0.15) 20px,
                    rgba(255, 255, 255, 0.3) 20px,
                    rgba(255, 255, 255, 0.3) 40px
                );
            }
            .action-icon {
                position: absolute;
                top: 12px;
                right: 0;
                margin-left: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <button class="fab-btn" id="open-modal-btn" title="Add New Snail Competitor">
            <i data-lucide="plus" style="width: 24px; height: 24px; stroke-width: 3px;"></i>
        </button>

        <header>
            <h1>🏁 THE GREAT CHORE SLOW-DOWN 🏁</h1>
            <p class="subtitle">Click a snail to reset its race track progress!</p>
        </header>

        <div id="stadiums-root"></div>
    </div>

    <div class="modal" id="task-modal">
        <h2>[ REGISTER NEW RACER ]</h2>
        <div class="form-row">
            <label>Chore Activity</label>
            <input type="text" id="task-name" placeholder="e.g., Vacuum my room" autocomplete="off">
        </div>
        <div class="form-row">
            <label>Race Division</label>
            <select id="task-group">
                <option value="house">House Upkeep</option>
                <option value="beauty">Beauty & Care</option>
                <option value="health">Health Logistics</option>
                <option value="work">Work & Admin</option>
            </select>
        </div>
        <div class="form-row">
            <label>Interval Target</label>
            <input type="number" id="freq-val" min="1" value="3">
        </div>
        <div class="form-row">
            <label>Time Dimension</label>
            <select id="freq-unit">
                <option value="days">Days</option>
                <option value="weeks">Weeks</option>
                <option value="months">Months</option>
            </select>
        </div>
        <div class="modal-buttons">
            <button class="btn btn-danger" id="close-modal-btn">Dismiss</button>
            <button class="btn btn-success" id="create-btn">Spawn Snail</button>
        </div>
    </div>

    <script>
        // Muted, pleasant pastel colors for the snail shells
        const snailColors = [
            '#e39696', '#9edba3', '#9ecceb', '#eed69b', 
            '#eebadc', '#cca6ed', '#eee7ad', '#f2b591'
        ];

        const groups = {
            house: { name: "House Upkeep", class: "house-title" },
            beauty: { name: "Beauty & Care", class: "beauty-title" },
            health: { name: "Health Logistics", class: "health-title" },
            work: { name: "Work & Admin", class: "work-title" }
        };

        // Initialize tasks from localStorage if available, otherwise default template tasks
        let tasks = JSON.parse(localStorage.getItem('snail_chore_tasks'));
        if (!tasks) {
            tasks = [
                { id: 1, name: "Vacuum room", group: "house", freqVal: 3, freqUnit: "days", lastDone: Date.now() - (1.5 * 24 * 60 * 60 * 1000) },
                { id: 2, name: "Mop kitchen flooring", group: "house", freqVal: 1, freqUnit: "weeks", lastDone: Date.now() - (5 * 24 * 60 * 60 * 1000) }, 
                { id: 3, name: "Cut my hair", group: "beauty", freqVal: 6, freqUnit: "months", lastDone: Date.now() - (2 * 30 * 24 * 60 * 60 * 1000) },
                { id: 4, name: "Replace toothbrush head", group: "health", freqVal: 3, freqUnit: "months", lastDone: Date.now() - (89 * 24 * 60 * 60 * 1000) }
            ];
            localStorage.setItem('snail_chore_tasks', JSON.stringify(tasks));
        }

        const stadiumsRoot = document.getElementById('stadiums-root');
        const modal = document.getElementById('task-modal');

        document.getElementById('open-modal-btn').onclick = () => modal.style.display = 'block';
        document.getElementById('close-modal-btn').onclick = () => modal.style.display = 'none';

        function saveToStorage() {
            localStorage.setItem('snail_chore_tasks', JSON.stringify(tasks));
        }

        function calculateProgress(task) {
            const now = Date.now();
            const timePassed = now - task.lastDone;
            
            let totalGoalMs = task.freqVal * 24 * 60 * 60 * 1000;
            if (task.freqUnit === 'weeks') {
                totalGoalMs = task.freqVal * 7 * 24 * 60 * 60 * 1000;
            } else if (task.freqUnit === 'months') {
                totalGoalMs = task.freqVal * 30 * 24 * 60 * 60 * 1000;
            }

            let percent = (timePassed / totalGoalMs) * 100;
            if (percent > 100) percent = 100;
            if (percent < 0) percent = 0;

            const msLeft = totalGoalMs - timePassed;
            let statusMarkup = "";
            let isOverdue = percent >= 100;

            if (isOverdue) {
                statusMarkup = `<span class="status-badge status-overdue">READY</span>`;
            } else {
                const daysLeft = Math.ceil(msLeft / (24 * 60 * 60 * 1000));
                statusMarkup = `<span class="status-badge status-running">${daysLeft}D LEFT</span>`;
            }

            return { percent, isOverdue, statusMarkup };
        }

        function generateSnailSvg(shellColor, eyeColor = '#6d7587') {
            return `
                <svg class="snail-svg" viewBox="0 0 16 12" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
                    <path d="M2 10h12v1H2zM1 9h12v1H1z" fill="#fce5bd" />
                    <path d="M11 8h2v1h-2zM12 5h1v3h-1zM13 4h1v1h-1z" fill="#fce5bd" />
                    <path d="M13 2h1v1h-1z" fill="${eyeColor}" />
                    <path d="M10 3h1v1h-1zM10 2h1v1h-1z" fill="#fce5bd" />
                    <path d="M10 1h1v1h-1z" fill="${eyeColor}" />
                    <path d="M4 4h5v5H4z" fill="${shellColor}" />
                    <path d="M5 3h3v1H5zM5 9h3v1H5zM3 5h1v3H3zM9 5h1v3H9z" fill="${shellColor}" />
                    <path d="M5 5h3v2H5z" fill="#ffffff" opacity="0.4" />
                    <path d="M6 6h1v1H6z" fill="${shellColor}" />
                </svg>
            `;
        }

        function renderTracks() {
            stadiumsRoot.innerHTML = '';

            Object.keys(groups).forEach(groupKey => {
                const groupConfig = groups[groupKey];
                const groupTasks = tasks.filter(t => t.group === groupKey);

                const stadiumWrapper = document.createElement('div');
                stadiumWrapper.className = 'stadium-wrapper';
                
                let lanesHTML = '';
                
                if (groupTasks.length === 0) {
                    lanesHTML = `<div class="empty-track-msg">No competitors assigned to this track division.</div>`;
                } else {
                    groupTasks.forEach((task, idx) => {
                        const { percent, isOverdue, statusMarkup } = calculateProgress(task);
                        const leftPosition = `calc(${percent}% - 52px)`;
                        
                        const shellColor = snailColors[idx % snailColors.length];
                        const snailSvgMarkup = generateSnailSvg(shellColor);

                        lanesHTML += `
                            <div class="stadium-lane">
                                <div class="snail-label-zone">
                                    <strong>${task.name}</strong>
                                    <div class="snail-meta">EVERY ${task.freqVal} ${task.freqUnit.toUpperCase()}</div>
                                    ${statusMarkup}
                                </div>
                                <div class="race-field">
                                    <span class="track-prop prop-flower">🌸</span>
                                    <span class="track-prop prop-grass">🌿</span>
                                    <span class="track-prop prop-pebble">🪨</span>
                                    
                                    <div class="finish-line-stripe"></div>
                                    
                                    <div class="pixel-snail-container ${isOverdue ? 'waiting' : ''}" 
                                         style="left: ${percent >= 6 ? leftPosition : '0px'};"
                                         onclick="resetSnail(${task.id})"
                                         title="Reset Snail Track Progress">
                                         ${snailSvgMarkup}
                                    </div>
                                </div>
                                <button class="action-icon" onclick="deleteTask(${task.id})" title="Remove">
                                    <i data-lucide="x-square" style="width:20px; height:20px;"></i>
                                </button>
                            </div>
                        `;
                    });
                }

                stadiumWrapper.innerHTML = `
                    <div class="group-title ${groupConfig.class}">${groupConfig.name} Track</div>
                    <div class="group-stadium">
                        <div class="lanes-container">${lanesHTML}</div>
                    </div>
                `;
                stadiumsRoot.appendChild(stadiumWrapper);
            });

            lucide.createIcons();
        }

        function resetSnail(id) {
            tasks = tasks.map(t => t.id === id ? { ...t, lastDone: Date.now() } : t);
            saveToStorage();
            renderTracks();
        }

        function deleteTask(id) {
            if(confirm("Disqualify this snail racer?")) {
                tasks = tasks.filter(t => t.id !== id);
                saveToStorage();
                renderTracks();
            }
        }

        document.getElementById('create-btn').onclick = function() {
            const name = document.getElementById('task-name').value.trim();
            const group = document.getElementById('task-group').value;
            const freqVal = parseInt(document.getElementById('freq-val').value);
            const freqUnit = document.getElementById('freq-unit').value;

            if(!name || !freqVal) return alert("Please specify the chore parameters!");

            tasks.push({
                id: Date.now(),
                name: name,
                group: group,
                freqVal: freqVal,
                freqUnit: freqUnit,
                lastDone: Date.now()
            });

            document.getElementById('task-name').value = '';
            modal.style.display = 'none';
            saveToStorage();
            renderTracks();
        };

        renderTracks();
        setInterval(renderTracks, 15000); // Refreshes tracks quietly in background
    </script>
</body>
</html>
